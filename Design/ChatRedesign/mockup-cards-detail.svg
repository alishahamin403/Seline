  <text x="1028" y="201" fill="#8A8176" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">RECEIPT</text>
  <text x="1280" y="201" fill="#8A8176" font-family="Arial, Helvetica, sans-serif" font-size="12">$32.50</text>
  <text x="1028" y="231" fill="#171717" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Airport Parking Reservation</text>
  <text x="1028" y="260" fill="#3E3933" font-family="Arial, Helvetica, sans-serif" font-size="15">Travel</text>
  <text x="1028" y="287" fill="#6B645B" font-family="Arial, Helvetica, sans-serif" font-size="14">Receipt card emphasizes amount and category without overpowering the answer.</text>

