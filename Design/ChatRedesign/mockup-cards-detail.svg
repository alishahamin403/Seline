  <text x="1028" y="393" fill="#8A8176" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">PLACE</text>
  <rect x="1248" y="389" width="82" height="24" rx="12" fill="#E9F0E8"/>
