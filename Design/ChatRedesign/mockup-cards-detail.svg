  <text x="588" y="393" fill="#8A8176" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">PERSON</text>
  <text x="588" y="423" fill="#171717" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Sarah Ahmed</text>
  <text x="588" y="452" fill="#3E3933" font-family="Arial, Helvetica, sans-serif" font-size="15">Close Friend</text>
  <text x="588" y="479" fill="#6B645B" font-family="Arial, Helvetica, sans-serif" font-size="14">Person cards are compact and relational, not profile-heavy.</text>

  <rect x="954" y="362" width="412" height="152" rx="24" fill="#FFFDFC" stroke="#E7E0D4"/>
  <circle cx="998" cy="408" r="16" fill="#E9E4D6"/>
