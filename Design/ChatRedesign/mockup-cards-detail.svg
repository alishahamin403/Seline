  <text x="148" y="452" fill="#3E3933" font-family="Arial, Helvetica, sans-serif" font-size="15">With Sarah and Leila</text>
  <text x="148" y="479" fill="#6B645B" font-family="Arial, Helvetica, sans-serif" font-size="14">Visit cards foreground people connections and elapsed time.</text>

