  <text x="148" y="201" fill="#8A8176" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">EMAIL</text>
  <text x="392" y="201" fill="#8A8176" font-family="Arial, Helvetica, sans-serif" font-size="12">4:18 PM</text>
