  <text x="262" y="439" fill="#8A8176" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="1.2">EMAIL</text>
  <text x="614" y="439" fill="#8A8176" font-family="Arial, Helvetica, sans-serif" font-size="12">Today</text>
  <text x="262" y="468" fill="#171717" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Check in for your flight to Atlanta</text>
  <text x="262" y="497" fill="#4F4841" font-family="Arial, Helvetica, sans-serif" font-size="14">Delta Air Lines · boarding info inside</text>

  <rect x="192" y="552" width="250" height="42" rx="21" fill="#F1ECE3" stroke="#E7E0D4"/>
