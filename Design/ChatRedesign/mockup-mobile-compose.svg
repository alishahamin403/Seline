  <text x="478" y="578" fill="#2C2722" font-family="Arial, Helvetica, sans-serif" font-size="14">How far is the airport?</text>

  <rect x="334" y="664" width="374" height="58" rx="24" fill="#E9E5DC"/>
  <text x="364" y="701" fill="#171717" font-family="Arial, Helvetica, sans-serif" font-size="17">When did I get that email?</text>

  <text x="232" y="804" fill="#171717" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Seline</text>
  <circle cx="206" cy="798" r="14" fill="#171717"/>
  <circle cx="206" cy="798" r="5" fill="#8FA58C"/>
  <text x="192" y="866" fill="#312C27" font-family="Arial, Helvetica, sans-serif" font-size="20">You got it today at 4:18 PM. It came from Delta Air Lines and it’s the same thread that contains the departure details.</text>

