  <text x="192" y="274" fill="#171717" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Your flight leaves tomorrow evening.</text>
  <text x="192" y="324" fill="#312C27" font-family="Arial, Helvetica, sans-serif" font-size="20">The latest travel email says check-in is open now, and the itinerary points to a 7:45 PM departure from Pearson.</text>

  <rect x="192" y="408" width="516" height="128" rx="24" fill="#FFFDFC" stroke="#E7E0D4"/>
